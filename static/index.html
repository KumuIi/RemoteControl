<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#12121f">
  <title>PC Remote</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    :root {
      --bg:       #12121f;
      --surface:  #1c1c2e;
      --surface2: #2a2a45;
      --accent:   #e94560;
      --purple:   #533483;
      --green:    #4ecca3;
      --red:      #e94560;
      --text:     #eaeaea;
      --dim:      #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--dim);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background .3s;
    }

    .dot.on { background: var(--green); }

    /* ── Content ── */
    .content {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    .tab {
      display: none;
      height: 100%;
      flex-direction: column;
    }

    .tab.active { display: flex; }

    /* ── TRACKPAD ── */
    #pad {
      flex: 1;
      margin: 12px 12px 8px;
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.05);
      touch-action: none;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pad::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(83,52,131,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .pad-hint {
      color: var(--dim);
      font-size: 12px;
      line-height: 2;
      text-align: center;
      pointer-events: none;
    }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px 6px;
      flex-shrink: 0;
    }

    .speed-label { font-size: 11px; color: var(--dim); white-space: nowrap; }

    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--surface2);
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      padding: 0 12px 12px;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      padding: 15px 6px;
      border: none;
      border-radius: 12px;
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .12s, transform .08s;
    }

    .btn:active { background: var(--purple); transform: scale(.95); }

    /* ── MEDIA ── */
    .media-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-label {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .mrow {
      display: flex;
      gap: 8px;
    }

    .mbtn {
      flex: 1;
      padding: 14px 4px;
      border: none;
      border-radius: 14px;
      background: var(--surface);
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: background .12s, transform .08s;
    }

    .mbtn span { font-size: 10px; color: var(--dim); }
    .mbtn:active { background: var(--surface2); transform: scale(.93); }

    .mbtn.play {
      font-size: 32px;
      padding: 18px 4px;
      background: var(--accent);
    }

    .mbtn.play:active { background: #c8394f; }

    /* ── KEYS ── */
    .keys-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .text-row {
      display: flex;
      gap: 8px;
    }

    .text-input {
      flex: 1;
      padding: 13px 14px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    .text-input:focus { border-color: var(--accent); }

    .send-btn {
      padding: 13px 18px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .send-btn:active { background: #c8394f; }

    .key-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .kbtn {
      padding: 14px 4px;
      background: var(--surface);
      border: none;
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .1s, transform .08s;
    }

    .kbtn:active { background: var(--surface2); transform: scale(.93); }

    .arrow-pad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      gap: 8px;
      justify-content: center;
    }

    .abtn {
      width: 56px;
      height: 48px;
      background: var(--surface);
      border: none;
      border-radius: 10px;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .1s;
    }

    .abtn:active { background: var(--surface2); }

    /* ── Bottom nav ── */
    .nav {
      display: flex;
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .nav-btn {
      flex: 1;
      padding: 9px 0 10px;
      background: none;
      border: none;
      color: var(--dim);
      font-size: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      touch-action: manipulation;
      transition: color .2s;
    }

    .nav-btn .ico { font-size: 21px; line-height: 1; }
    .nav-btn.active { color: var(--accent); }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-title">PC Remote</span>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</div>

<!-- Content -->
<div class="content">

  <!-- TRACKPAD -->
  <div class="tab active" id="tab-trackpad">
    <div id="pad">
      <div class="pad-hint">
        Drag → move mouse<br>
        Tap → left click<br>
        Hold → right click<br>
        2 fingers → scroll
      </div>
    </div>
    <div class="speed-row">
      <span class="speed-label">Speed</span>
      <input type="range" id="speed" min="0.5" max="4" step="0.1" value="1.5">
      <span class="speed-label" id="speedVal">1.5×</span>
    </div>
    <div class="btn-row">
      <button class="btn" id="btnL">Left Click</button>
      <button class="btn" id="btnD">Double</button>
      <button class="btn" id="btnR">Right Click</button>
    </div>
  </div>

  <!-- MEDIA -->
  <div class="tab" id="tab-media">
    <div class="media-scroll">
      <div class="section-label">Playback</div>
      <div class="mrow">
        <button class="mbtn" data-keys='["left"]'>⏪<span>−10s</span></button>
        <button class="mbtn play" data-keys='["space"]'>⏯</button>
        <button class="mbtn" data-keys='["right"]'>⏩<span>+10s</span></button>
      </div>

      <div class="section-label">Volume</div>
      <div class="mrow">
        <button class="mbtn" data-keys='["volumedown"]'>🔉<span>Vol −</span></button>
        <button class="mbtn" data-keys='["volumemute"]'>🔇<span>Mute</span></button>
        <button class="mbtn" data-keys='["volumeup"]'>🔊<span>Vol +</span></button>
      </div>

      <div class="section-label">YouTube shortcuts</div>
      <div class="mrow">
        <button class="mbtn" data-keys='["f"]'>⛶<span>Fullscreen</span></button>
        <button class="mbtn" data-keys='["t"]'>📺<span>Theater</span></button>
        <button class="mbtn" data-keys='["m"]'>🔕<span>YT Mute</span></button>
      </div>
      <div class="mrow">
        <button class="mbtn" data-keys='["j"]'>⏮<span>−10s (J)</span></button>
        <button class="mbtn" data-keys='["k"]'>⏯<span>Play (K)</span></button>
        <button class="mbtn" data-keys='["l"]'>⏭<span>+10s (L)</span></button>
      </div>

      <div class="section-label">Browser</div>
      <div class="mrow">
        <button class="mbtn" data-hotkey='["alt","left"]'>◀<span>Back</span></button>
        <button class="mbtn" data-keys='["f5"]'>↻<span>Reload</span></button>
        <button class="mbtn" data-hotkey='["alt","right"]'>▶<span>Forward</span></button>
      </div>
    </div>
  </div>

  <!-- KEYS -->
  <div class="tab" id="tab-keys">
    <div class="keys-scroll">
      <div class="text-row">
        <input class="text-input" id="textInput" type="text" placeholder="Type to send to PC…" autocomplete="off">
        <button class="send-btn" id="sendBtn">➤</button>
      </div>

      <div class="section-label">Special keys</div>
      <div class="key-grid">
        <button class="kbtn" data-keys='["escape"]'>Esc</button>
        <button class="kbtn" data-keys='["tab"]'>Tab</button>
        <button class="kbtn" data-keys='["enter"]'>Enter</button>
        <button class="kbtn" data-keys='["backspace"]'>⌫</button>
        <button class="kbtn" data-hotkey='["ctrl","c"]'>Copy</button>
        <button class="kbtn" data-hotkey='["ctrl","v"]'>Paste</button>
        <button class="kbtn" data-hotkey='["ctrl","z"]'>Undo</button>
        <button class="kbtn" data-hotkey='["ctrl","a"]'>Sel All</button>
        <button class="kbtn" data-hotkey='["ctrl","t"]'>New Tab</button>
        <button class="kbtn" data-hotkey='["ctrl","w"]'>Close Tab</button>
        <button class="kbtn" data-keys='["delete"]'>Delete</button>
        <button class="kbtn" data-hotkey='["alt","f4"]'>Alt+F4</button>
      </div>

      <div class="section-label">Arrow keys</div>
      <div class="arrow-pad">
        <div></div>
        <button class="abtn" data-keys='["up"]'>↑</button>
        <div></div>
        <button class="abtn" data-keys='["left"]'>←</button>
        <button class="abtn" data-keys='["down"]'>↓</button>
        <button class="abtn" data-keys='["right"]'>→</button>
      </div>
    </div>
  </div>

</div><!-- /content -->

<!-- Bottom nav -->
<div class="nav">
  <button class="nav-btn active" data-tab="trackpad">
    <span class="ico">🖱️</span>Trackpad
  </button>
  <button class="nav-btn" data-tab="media">
    <span class="ico">▶️</span>Media
  </button>
  <button class="nav-btn" data-tab="keys">
    <span class="ico">⌨️</span>Keys
  </button>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  // ── Socket ──
  const socket = io();
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');

  socket.on('connect', () => {
    dot.classList.add('on');
    statusText.textContent = 'Connected';
  });

  socket.on('disconnect', () => {
    dot.classList.remove('on');
    statusText.textContent = 'Disconnected';
  });

  // ── Tab switching ──
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.tab;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + id).classList.add('active');
    });
  });

  // ── Speed slider ──
  const speedSlider = document.getElementById('speed');
  const speedVal    = document.getElementById('speedVal');
  speedSlider.addEventListener('input', () => {
    speedVal.textContent = parseFloat(speedSlider.value).toFixed(1) + '×';
  });

  // ── Trackpad ──
  const pad = document.getElementById('pad');
  let last = null, startPos = null, startTime = 0;
  let longTimer = null, didMove = false;
  let scrolling = false, lastScrollY = 0;

  pad.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length >= 2) {
      scrolling = true;
      didMove   = true;
      clearTimeout(longTimer);
      longTimer = null;
      lastScrollY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      return;
    }
    scrolling = false;
    didMove   = false;
    const t = e.touches[0];
    last = startPos = { x: t.clientX, y: t.clientY };
    startTime = Date.now();
    longTimer = setTimeout(() => {
      socket.emit('click', { button: 'right' });
      navigator.vibrate && navigator.vibrate([30, 20, 40]);
      longTimer = null;
      didMove   = true; // prevent tap-click after right-click
    }, 600);
  }, { passive: false });

  pad.addEventListener('touchmove', e => {
    e.preventDefault();

    // Two-finger scroll
    if (scrolling && e.touches.length >= 2) {
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const delta = lastScrollY - cy;
      if (Math.abs(delta) > 2) {
        socket.emit('scroll', { dy: Math.round(delta * 0.2) });
        lastScrollY = cy;
      }
      return;
    }

    if (e.touches.length !== 1) return;
    const t = e.touches[0];

    // Detect movement threshold to cancel long-press
    if (!didMove) {
      const dist = Math.hypot(t.clientX - startPos.x, t.clientY - startPos.y);
      if (dist > 6) {
        didMove = true;
        clearTimeout(longTimer);
        longTimer = null;
      }
    }

    if (didMove) {
      const speed = parseFloat(speedSlider.value);
      socket.emit('mouse_move', {
        dx: Math.round((t.clientX - last.x) * speed),
        dy: Math.round((t.clientY - last.y) * speed)
      });
    }
    last = { x: t.clientX, y: t.clientY };
  }, { passive: false });

  pad.addEventListener('touchend', e => {
    e.preventDefault();
    scrolling = false;
    if (longTimer) {
      clearTimeout(longTimer);
      longTimer = null;
      if (!didMove) {
        socket.emit('click', { button: 'left' });
        navigator.vibrate && navigator.vibrate(18);
      }
    }
  }, { passive: false });

  // ── Trackpad buttons ──
  document.getElementById('btnL').addEventListener('click', () => socket.emit('click', { button: 'left' }));
  document.getElementById('btnR').addEventListener('click', () => socket.emit('click', { button: 'right' }));
  document.getElementById('btnD').addEventListener('click', () => socket.emit('double_click', {}));

  // ── Key / hotkey buttons (media + keys tabs) ──
  function attachKeyButtons() {
    document.querySelectorAll('[data-keys]').forEach(btn => {
      btn.addEventListener('click', () => {
        socket.emit('key', { keys: JSON.parse(btn.dataset.keys) });
      });
    });
    document.querySelectorAll('[data-hotkey]').forEach(btn => {
      btn.addEventListener('click', () => {
        socket.emit('key', { keys: JSON.parse(btn.dataset.hotkey) });
      });
    });
  }
  attachKeyButtons();

  // ── Text send ──
  function sendText() {
    const input = document.getElementById('textInput');
    const text  = input.value;
    if (!text) return;
    socket.emit('type_text', { text });
    input.value = '';
  }

  document.getElementById('sendBtn').addEventListener('click', sendText);
  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendText();
  });
</script>
</body>
</html>
